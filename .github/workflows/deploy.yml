name: deploy hello world
on:
  push:
    branches:
      - dev
permissions:
  contents: read
  id-token: write
env:
  AWS_REGION: us-east-1
  #AWS_ROLE_ARN: arn:aws:iam::886601940523:role/github-actions-s3-cloudfront-deploy
  SITE_BUCKET_NAME: hello-dev-openspacenexus-store
  TERRAFORM_DIR: ./infra 
jobs:
  ci:
    name: lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: site/my-app/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: site/my-app
        run: npm ci
      - name: Run Lint
        working-directory: site/my-app
        run: npm run lint 
      - name: Run Tests
        working-directory: site/my-app
        run: npm test
      - name: terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra


    
        
        
        



