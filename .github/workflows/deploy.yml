name: deploy splatial
on:
  push:
    branches:
      - dev
      - staging
      - main
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - "docs/**"
      - "scripts/**"
      - "worker/**"
      - ".cursor/**"
      - "**/*.prompt.md"
permissions:
  contents: read
  id-token: write
concurrency:
  group: deploy-${{ github.ref }}
  # cancel-in-progress saves minutes on rapid pushes; a cancel mid-apply may leave
  # a Terraform state lock — unlock with: terraform force-unlock <LOCK_ID>
  cancel-in-progress: true
env:
  AWS_REGION: us-east-1
  #AWS_ROLE_ARN: arn:aws:iam::886601940523:role/github-actions-s3-cloudfront-deploy
  SITE_BUCKET_NAME: splatial-dev-openspacenexus-store
  TERRAFORM_DIR: ./infra
jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            infra:
              - 'infra/**'
              - '.github/workflows/deploy.yml'
  ci:
    name: lint and test
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci
      - name: Run Lint
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run lint
      # - name: Run Tests
      #   if: needs.changes.outputs.frontend == 'true'
      #   working-directory: frontend
      #   run: npm test
      - name: terraform setup
        if: needs.changes.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
      - name: Terraform Format Check
        if: needs.changes.outputs.infra == 'true'
        run: terraform fmt -check -recursive
        working-directory: infra
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [changes, ci]
    if: >
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.backend == 'true'
    timeout-minutes: 35
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Environment Context
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "gh_env=development" >> "$GITHUB_OUTPUT"
            echo "tf_dir=infra/envs/dev" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "gh_env=staging" >> "$GITHUB_OUTPUT"
            echo "tf_dir=infra/envs/staging" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "gh_env=production" >> "$GITHUB_OUTPUT"
            echo "tf_dir=infra/envs/prod" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS credentials for Deployment
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::886601940523:role/splatial-${{ github.ref_name == 'main' && 'prod' || github.ref_name }}-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Show AWS identity
        run: aws sts get-caller-identity
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: ${{ steps.set-env.outputs.tf_dir }}
        run: terraform init
      # Deploy-role policy updates do not affect the already-assumed OIDC session.
      # Apply IAM policies first, then re-assume the role so later API calls (e.g.
      # autoscaling:EnableMetricsCollection) see the updated permissions.
      - name: Terraform Apply deploy IAM policies
        if: needs.changes.outputs.infra == 'true'
        working-directory: ${{ steps.set-env.outputs.tf_dir }}
        run: |
          DEPLOY_IAM_TARGETS=(
            -target=module.static_site.aws_iam_policy.github_deploy_core_policy
            -target=module.static_site.aws_iam_role_policy_attachment.github_deploy_core
            -target=module.static_site.time_sleep.iam_propagation
            -target=module.static_site.aws_iam_policy.github_deploy_compute_policy
            -target=module.static_site.aws_iam_role_policy_attachment.github_deploy_compute
            -target=module.static_site.time_sleep.compute_iam_propagation
            -target=module.static_site.aws_iam_policy.github_deploy_network_policy
            -target=module.static_site.aws_iam_role_policy_attachment.github_deploy_network
            -target=module.static_site.time_sleep.network_iam_propagation
            -target=module.static_site.aws_iam_policy.github_deploy_cdn_policy
            -target=module.static_site.aws_iam_role_policy_attachment.github_deploy_cdn
            -target=module.static_site.time_sleep.cdn_iam_propagation
          )
          terraform apply -auto-approve "${DEPLOY_IAM_TARGETS[@]}"
      - name: Refresh AWS credentials after IAM policy update
        if: needs.changes.outputs.infra == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::886601940523:role/splatial-${{ github.ref_name == 'main' && 'prod' || github.ref_name }}-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Apply
        if: >
          needs.changes.outputs.infra == 'true' ||
          needs.changes.outputs.backend == 'true'
        working-directory: ${{ steps.set-env.outputs.tf_dir }}
        run: |
          # The deploy role and its trust policy are managed in infra/bootstrap
          # (bootstrap.yml workflow).  This workflow only attaches application-
          # specific IAM policies to the pre-existing role; it never modifies
          # the trust chain that allows it to run in the first place.
          terraform apply -auto-approve
      - name: Read Terraform outputs
        if: needs.changes.outputs.frontend == 'true'
        id: tf
        working-directory: ${{ steps.set-env.outputs.tf_dir }}
        run: |
          {
            echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "site_url=$(terraform output -raw site_url)"
            echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "cognito_client_id=$(terraform output -raw cognito_client_id)"
            echo "api_endpoint=$(terraform output -raw api_endpoint)"
            echo "raw_scenes_bucket_name=$(terraform output -raw raw_scenes_bucket_name)"
            echo "scenes_table_name=$(terraform output -raw scenes_table_name)"
          } >> "$GITHUB_OUTPUT"
      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci
      - name: Build the Frontend artifacts
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_AWS_REGION: us-east-1
          NEXT_PUBLIC_USER_POOL_ID: ${{ steps.tf.outputs.cognito_user_pool_id }}
          NEXT_PUBLIC_CLIENT_ID: ${{ steps.tf.outputs.cognito_client_id }}
          NEXT_PUBLIC_API_GATEWAY_URL: ${{ steps.tf.outputs.api_endpoint }}
          NEXT_PUBLIC_RAW_SCENES_BUCKET: ${{ steps.tf.outputs.raw_scenes_bucket_name }}
          NEXT_PUBLIC_SCENES_TABLE: ${{ steps.tf.outputs.scenes_table_name }}
      - name: Sync Static Assets to S3
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          aws s3 sync ./out s3://${{ steps.tf.outputs.s3_bucket_name }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude ".terraform/*" \
            --exclude "*.tf" \
            --exclude "*.tfvars" \
            --exclude "README.md"
      - name: Invalidate CloudFront
        if: needs.changes.outputs.frontend == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cloudfront_distribution_id }} \
            --paths "/*"
      - name: Show deployed site URL
        if: needs.changes.outputs.frontend == 'true'
        run: |
          echo "Deployed to: ${{ steps.tf.outputs.site_url }}"
